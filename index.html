<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LagunApp</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{font-family:'Poppins',sans-serif;box-sizing:border-box;}
    body{background:#f0f7f4;margin:0;}
    :root{--g1:#1b4332;--g2:#2d6a4f;--g3:#52b788;--g4:#74c69d;--g5:#d8f3dc;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:#52b788;border-radius:10px;}
    .screen{display:none;min-height:100vh;}
    .screen.active{display:flex;}
    .auth-left{background:linear-gradient(160deg,#1b4332 0%,#2d6a4f 50%,#52b788 100%);}
    .glass{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);}
    .card-zoom:hover{transform:scale(1.02);transition:transform 0.3s ease;}
    #toast{visibility:hidden;min-width:250px;margin-left:-125px;background-color:#1b4332;color:#fff;text-align:center;border-radius:8px;padding:16px;position:fixed;z-index:100;left:50%;bottom:30px;font-size:14px;}
    #toast.show{visibility:visible;animation:fadein 0.5s,fadeout 0.5s 2.5s;}
    @keyframes fadein{from{bottom:0;opacity:0;}to{bottom:30px;opacity:1;}}
    @keyframes fadeout{from{bottom:30px;opacity:1;}to{bottom:0;opacity:0;}}
  </style>
</head>
<body>

<div id="toast"></div>

<script src="data.js"></script>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
// El arreglo demoUsers ya está disponible gracias a data.js
let currentUser = null;         
let quizData = {};              
let chats = {};                 
let activeChatId = null;        
let groups = [
  {id:1,name:"Bilbo Mendi Taldea",desc:"Mendira joateko taldea Bilbo inguruan.",members:[1,4,6],color:"bg-emerald-100 text-emerald-700",icon:"🏔️"},
  {id:2,name:"Donosti Tech",desc:"Programatzaileak eta tech zaleak Gipuzkoan.",members:[2,7],color:"bg-blue-100 text-blue-700",icon:"💻"},
  {id:3,name:"Gasteizko Artistak",desc:"Marrazketa eta sormen tailerrak.",members:[3,8],color:"bg-purple-100 text-purple-700",icon:"🎨"}
];

// ═══════════════════════════════════════════════════
//  CORE LOGIC (LOGIN, NAVEGACIÓN, RENDER...)
// ═══════════════════════════════════════════════════

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

// ... (Aquí irían todas tus funciones: doLogin, renderDiscover, showProfile, etc.)
// Nota: Como ahora demoUsers viene de data.js, todas tus funciones seguirán funcionando igual.

function doLogin(){
  const email = document.getElementById('li-email').value;
  if(!email.includes('@')) { showToast('❌ Posta okerra'); return; }
  
  const saved = localStorage.getItem('lagunapp_user');
  if(saved){
    currentUser = JSON.parse(saved);
  } else {
    currentUser = {
      name: "Erabiltzaile Berria",
      username: "user_" + Math.floor(Math.random()*1000),
      age: 25,
      city: "Euskadi",
      gender: "Beste bat",
      bio: "Kaixo! LagunApp erabiltzaile berria naiz.",
      food: ["🍕 Pizza"], sport: ["🏃 Korrika"], free: ["☕ Lagunartea"], music: ["🎵 Indie"],
      pers: ["😊 Atsegina"], plans: ["☕ Kafetegian hitz egin"],
      color: "from-green-400 to-emerald-600",
      avatar: "U"
    };
  }
  showScreen('main');
  renderTopbar();
  renderDiscover();
  renderMyProfile();
}

// Inicialización automática para el demo
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('li-email').value='demo@lagunapp.eu';
  document.getElementById('li-pass').value='demo123';
});

// El resto de funciones que ya tenías (renderDiscover, renderChats, etc.)
</script>
</body>
</html>
