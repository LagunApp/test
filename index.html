<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LagunApp</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
    *{font-family: 'Poppins', sans-serif;box-sizing:border-box;}
    body{background:#f0f7f4;margin:0;}
    :root{--g1:#1b4332;--g2:#2d6a4f;--g3:#52b788;--g4:#74c69d;--g5:#d8f3dc;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb {background:#52b788; border-radius:10px;}
    .screen{display:none; min-height:100vh;}
    .screen.active{display:flex;}
    .auth-left{background:linear-gradient(160deg,#1b4332 0%, #2d6a4f 50%, #52b788 100%); flex:1;display: flex; flex-direction:column; align-items:center; justify-content:center;padding:40px;position:relative; overflow:hidden;}
    .auth-right{flex:1;display: flex; align-items:center; justify-content:center;padding:40px;background:#fff;}
    .logo-big{font-size:3rem;font-weight:800;color:#fff;letter-spacing:-1px;}
    .logo-big span{color:#74c69d;}
    .inp{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:0.9rem;outline:none;background:#f9fafb;color:#111;}
    .inp:focus{border-color:#52b788;background:#fff;}
    .lbl{display:block;font-weight:600; color:#1b4332;font-size:0.82rem;margin-bottom:5px;}
    .btn-g{background:linear-gradient(135deg,#52b788,#74c69d);color:#1b4332;font-weight:700;padding:13px 28px;border-radius: 12px; border:none; cursor:pointer;width:100%;transition:all .25s;}
    .btn-outline{background:transparent; color:#52b788;font-weight:600;padding:11px 28px;border-radius: 12px;border:2px solid #52b788;cursor:pointer;width:100%;}
    .app-shell{display: flex;height:100vh;width:100%;overflow:hidden;}
    .sidebar{width:72px; background:linear-gradient(180deg,#1b4332 0%, #2d6a4f 100%); display:flex; flex-direction:column; align-items:center;padding:20px 0;gap:6px; flex-shrink:0;}
    .sb-btn{width:48px;height:48px;border-radius: 14px;display: flex; align-items:center; justify-content:center;font-size:1.4rem;cursor:pointer;color:rgba(255,255,255,.6); border:none;background:transparent;}
    .sb-btn.active{background:rgba(255,255,255,.15); color:#74c69d;}
    .main-panel{flex:1;display: flex; flex-direction:column; overflow:hidden;}
    .topbar{background:#fff;padding:0 24px;height:64px;display: flex; align-items:center; border-bottom:1px solid #e8f5e9;gap:16px;}
    .view{display:none; flex:1;overflow-y:auto;padding:24px;}
    .view.active{display:block;}
    .profile-card{background:#fff;border-radius: 20px;border:1px solid #e8f5e9;overflow:hidden; cursor:pointer;transition:all .25s;}
    .chat-layout{display: flex;height:100%;overflow:hidden;}
    .chat-list{width:300px;border-right:1px solid #e8f5e9;overflow-y:auto;background:#fff;}
    .chat-window{flex:1;display: flex; flex-direction:column; background:#f0f7f4;}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display: flex; flex-direction:column;gap:10px;}
    .msg{max-width:68%; padding:10px 14px;border-radius: 18px; font-size:0.88rem;position:relative;}
    .msg-in{background:#fff;align-self:flex-start;}
    .msg-out{background:linear-gradient(135deg,#52b788,#74c69d); color:#fff;align-self:flex-end;}
    .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.55);z-index:200; display:none;align-items:center; justify-content:center;padding:20px;backdrop-filter:blur(4px);}
    .modal-box{background:#fff;border-radius: 24px;max-width:500px;width:100%;padding:20px;}
    .toast{position:fixed; bottom:28px; right:28px;background:#1b4332;color:#fff;padding:14px 22px;border-radius: 14px;opacity:0;transition:all .4s;}
    .toast.show{opacity:1; transform:translateY(-10px);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="sc-login" class="screen active">
    <div class="auth-left">
        <div class="logo-big">Lagun<span>App</span></div>
        <p style="color:white; opacity:0.8;">Zure gustuekin bat datozen lagunak.</p>
    </div>
    <div class="auth-right">
        <div style="width:100%; max-width:320px;">
            <div id="form-login">
                <h2 class="lbl" style="font-size:1.5rem;">Hasi saioa</h2>
                <input id="li-email" type="email" class="inp" placeholder="Email-a" style="margin-bottom:10px;"/>
                <input id="li-pass" type="password" class="inp" placeholder="Pasahitza" style="margin-bottom:20px;"/>
                <button class="btn-g" onclick="doLogin()">Sartu</button>
            </div>
        </div>
    </div>
</div>

<!-- APP -->
<div id="sc-app" class="screen">
    <div class="app-shell">
        <nav class="sidebar">
            <div style="color:#74c69d; font-weight:800; margin-bottom:20px;">L</div>
            <button class="sb-btn active" onclick="switchView('discover')">🔍</button>
            <button class="sb-btn" onclick="switchView('chat')">💬</button>
            <button class="sb-btn" onclick="doLogout()">🚪</button>
        </nav>
        <div class="main-panel">
            <div class="topbar">
                <span id="topbar-title" style="font-weight:700;">Lagun berriak</span>
            </div>
            
            <div id="view-discover" class="view active">
                <div id="discover-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;"></div>
            </div>

            <div id="view-chat" class="view" style="padding:0;">
                <div class="chat-layout">
                    <div class="chat-list" id="chat-list-items"></div>
                    <div class="chat-window">
                        <div id="chat-messages" class="chat-messages"></div>
                        <div style="padding:15px; background:#fff; display:flex; gap:10px;">
                            <input id="chat-msg-input" class="inp" placeholder="Idatzi..." onkeydown="if(event.key==='Enter')sendMessage()"/>
                            <button class="btn-g" style="width:auto;" onclick="sendMessage()">></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Mock Data
    const demoUsers = [
        {id: 1, name: "Ane", city: "Bilbo", age: 24, bio: "Mendi zalea", match: 95},
        {id: 2, name: "Mikel", city: "Donostia", age: 28, bio: "Surflaria", match: 88}
    ];

    let currentUser = null;
    let activeChatId = null;
    let messages = {};

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function doLogin() {
        const email = document.getElementById('li-email').value;
        if(email) {
            currentUser = { name: "Erabiltzailea", email: email };
            document.getElementById('sc-login').classList.remove('active');
            document.getElementById('sc-app').classList.add('active');
            renderDiscover();
        }
    }

    function doLogout() {
        location.reload();
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.getElementById('topbar-title').textContent = v === 'chat' ? 'Mezuak' : 'Lagun berriak';
        if(v === 'chat') renderChatList();
    }

    function renderDiscover() {
        const grid = document.getElementById('discover-grid');
        grid.innerHTML = demoUsers.map(u => `
            <div class="profile-card" onclick="startChat(${u.id})">
                <div style="height:80px; background:#52b788;"></div>
                <div style="padding:15px;">
                    <div style="font-weight:700;">${u.name}, ${u.age}</div>
                    <div style="font-size:0.8rem; color:#6b7280;">${u.city}</div>
                    <div style="font-size:0.8rem; margin-top:5px;">${u.bio}</div>
                </div>
            </div>
        `).join('');
    }

    function startChat(userId) {
        activeChatId = userId;
        if(!messages[userId]) messages[userId] = [];
        switchView('chat');
        renderChatWindow();
    }

    function renderChatList() {
        const list = document.getElementById('chat-list-items');
        list.innerHTML = demoUsers.map(u => `
            <div style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;" onclick="startChat(${u.id})">
                <strong>${u.name}</strong>
            </div>
        `).join('');
    }

    function renderChatWindow() {
        const area = document.getElementById('chat-messages');
        const chatMsgs = messages[activeChatId] || [];
        area.innerHTML = chatMsgs.map(m => `
            <div class="msg ${m.from === 'me' ? 'msg-out' : 'msg-in'}">${m.text}</div>
        `).join('');
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('chat-msg-input');
        const text = input.value.trim();
        if(text && activeChatId) {
            messages[activeChatId].push({from: 'me', text: text});
            input.value = '';
            renderChatWindow();
            
            // Auto reply
            setTimeout(() => {
                messages[activeChatId].push({from: 'them', text: "Kaixo! Zer moduz?"});
                renderChatWindow();
            }, 1000);
        }
    }
</script>
</body>
</html>
